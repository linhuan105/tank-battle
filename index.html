<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 100, 200, 0.3);
            display: none;
        }
        #ui {
            position: absolute;
            top: -50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        #mainMenu {
            background: rgba(0,0,0,0.9);
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            color: #fff;
            box-shadow: 0 0 50px rgba(100, 100, 200, 0.4);
        }
        h1 {
            font-size: 56px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;
            letter-spacing: 6px;
        }
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 18px;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #aaa;
        }
        .stat-value {
            color: #ffd93d;
            font-weight: bold;
        }
        .stat-value.highlight {
            color: #4ade80;
            font-size: 24px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }
        .btn.resume {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
        .btn.reset {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            padding: 10px 30px;
            font-size: 16px;
        }
        .instructions {
            margin-top: 20px;
            text-align: center;
            line-height: 2;
            color: #888;
            font-size: 14px;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            border-radius: 8px;
        }
        #gameOverScreen {
            display: none;
        }
        #finalScore {
            font-size: 32px;
            color: #ffd93d;
            margin: 20px 0;
        }
        .tank-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <span>分数: <span id="score">0</span></span>
            <span>波次: <span id="wave">1</span></span>
            <span>生命: <span id="lives">∞</span></span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="mainMenu">
            <div class="tank-icon">🎮</div>
            <h1>坦克大战</h1>
            <p class="subtitle">经典街机射击游戏</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">最高波次</span>
                    <span class="stat-value" id="bestWave">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">最高分数</span>
                    <span class="stat-value highlight" id="bestScore">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">已消灭敌人</span>
                    <span class="stat-value" id="totalKills">0</span>
                </div>
            </div>
            
            <button class="btn resume" id="resumeBtn" onclick="startGame()">继续游戏</button>
            <button class="btn" id="newGameBtn" onclick="newGame()">重新开始</button>
            <button class="btn reset" onclick="resetProgress()">重置进度</button>
            
            <div class="instructions">
                <p>鼠标移动 - 控制方向和移动</p>
                <p>鼠标左键 - 发射炮弹（100发）</p>
                <p>无限波次，敌人数量慢慢增加！</p>
            </div>
        </div>
        
        <div id="startScreen">
            <h1>🎮 坦克大战</h1>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>游戏结束</h1>
            <div id="finalScore">得分: 0</div>
            <button class="btn" onclick="restartGame()">返回主页</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 40;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;

        let gameState = 'menu';
        let score = 0;
        let wave = 1;
        let player = null;
        let enemies = [];
        let bullets = [];
        let obstacles = [];
        let particles = [];
        let keys = {};
        let mouseX = 0;
        let mouseY = 0;

        let bestScore = 0;
        let bestWave = 1;
        let totalKills = 0;

        function loadProgress() {
            const saved = localStorage.getItem('tankBattleProgress');
            if (saved) {
                const data = JSON.parse(saved);
                bestScore = data.bestScore || 0;
                bestWave = data.bestWave || 1;
                totalKills = data.totalKills || 0;
            }
            updateMainMenuStats();
        }

        function saveProgress() {
            const data = {
                bestScore: bestScore,
                bestWave: bestWave,
                totalKills: totalKills
            };
            localStorage.setItem('tankBattleProgress', JSON.stringify(data));
        }

        function updateMainMenuStats() {
            document.getElementById('bestWave').textContent = bestWave;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('totalKills').textContent = totalKills;
        }

        function resetProgress() {
            if (confirm('确定要重置所有进度吗？')) {
                bestScore = 0;
                bestWave = 1;
                totalKills = 0;
                saveProgress();
                updateMainMenuStats();
            }
        }

        class Tank {
            constructor(x, y, isPlayer = false, difficulty = 1) {
                this.x = x;
                this.y = y;
                this.width = GRID_SIZE - 4;
                this.height = GRID_SIZE - 4;
                this.direction = isPlayer ? 'up' : 'down';
                this.isPlayer = isPlayer;
                this.speed = isPlayer ? 4 : 2 + (difficulty - 1) * 0.4;
                this.health = isPlayer ? 9999 : 1 + Math.floor(difficulty / 3);
                this.fireRate = isPlayer ? 150 : 1500 - (difficulty - 1) * 100;
                this.lastFire = 0;
                this.moveTimer = 0;
                this.moveInterval = isPlayer ? 0 : 500 + Math.random() * 500 - (difficulty - 1) * 50;
                this.targetDirection = null;
                this.difficulty = difficulty;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

                const angle = { 'up': 0, 'down': Math.PI, 'left': -Math.PI / 2, 'right': Math.PI / 2 }[this.direction];
                ctx.rotate(angle);

                if (this.isPlayer) {
                    ctx.fillStyle = '#22c55e';
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                    ctx.fillStyle = '#166534';
                    ctx.fillRect(-this.width / 2 + 2, -this.height / 2 + 2, this.width - 4, this.height - 4);

                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(-6, -this.height / 2, 12, this.height);

                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#86efac';
                    ctx.fillRect(8, -10, 16, 6);
                    ctx.fillRect(8, 4, 16, 6);

                    ctx.fillStyle = '#fef08a';
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#d97706';
                    ctx.fillRect(-this.width / 2, -this.height / 2 - 4, this.width, 4);
                    ctx.fillRect(-this.width / 2, this.height / 2, this.width, 4);

                    ctx.fillStyle = '#92400e';
                    for (let i = -this.width / 2; i < this.width / 2; i += 8) {
                        ctx.fillRect(i, -this.height / 2 - 4, 4, 4);
                        ctx.fillRect(i, this.height / 2, 4, 4);
                    }
                } else {
                    ctx.fillStyle = '#dc2626';
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                    ctx.fillStyle = '#991b1b';
                    ctx.fillRect(-this.width / 2 + 2, -this.height / 2 + 2, this.width - 4, this.height - 4);

                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(-6, -this.height / 2, 12, this.height);

                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#fca5a5';
                    ctx.fillRect(8, -10, 16, 6);
                    ctx.fillRect(8, 4, 16, 6);

                    ctx.fillStyle = '#fca5a5';
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#78350f';
                    ctx.fillRect(-this.width / 2, -this.height / 2 - 4, this.width, 4);
                    ctx.fillRect(-this.width / 2, this.height / 2, this.width, 4);

                    ctx.fillStyle = '#451a03';
                    for (let i = -this.width / 2; i < this.width / 2; i += 8) {
                        ctx.fillRect(i, -this.height / 2 - 4, 4, 4);
                        ctx.fillRect(i, this.height / 2, 4, 4);
                    }
                }

                ctx.restore();
            }

            update(dt) {
                if (this.isPlayer) {
                    this.handlePlayerInput();
                } else {
                    this.handleEnemyAI(dt);
                }
            }

            handlePlayerInput() {
                if (!player) return;

                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const dx = mouseX - centerX;
                const dy = mouseY - centerY;

                if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        this.direction = dx > 0 ? 'right' : 'left';
                    } else {
                        this.direction = dy > 0 ? 'down' : 'up';
                    }

                    const moveDistance = this.speed;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const moveX = (dx / distance) * moveDistance;
                    const moveY = (dy / distance) * moveDistance;

                    const newX = this.x + moveX;
                    const newY = this.y + moveY;

                    if (this.canMoveTo(newX, newY)) {
                        this.x = newX;
                        this.y = newY;
                    }
                }

                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
            }

            handleEnemyAI(dt) {
                if (!player) return;

                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const dx = player.x + player.width / 2 - centerX;
                const dy = player.y + player.height / 2 - centerY;

                if (Math.abs(dx) > Math.abs(dy)) {
                    this.direction = dx > 0 ? 'right' : 'left';
                } else {
                    this.direction = dy > 0 ? 'down' : 'up';
                }

                let newX = this.x;
                let newY = this.y;

                switch (this.direction) {
                    case 'up': newY -= this.speed; break;
                    case 'down': newY += this.speed; break;
                    case 'left': newX -= this.speed; break;
                    case 'right': newX += this.speed; break;
                }

                if (this.canMoveTo(newX, newY)) {
                    this.x = newX;
                    this.y = newY;
                }

                if (Math.random() < 0.03 + this.difficulty * 0.005) {
                    this.fire();
                }
            }

            canMoveTo(newX, newY) {
                const margin = 2;
                for (let obs of obstacles) {
                    if (newX < obs.x + obs.width + margin &&
                        newX + this.width > obs.x - margin &&
                        newY < obs.y + obs.height + margin &&
                        newY + this.height > obs.y - margin) {
                        return false;
                    }
                }

                for (let enemy of enemies) {
                    if (enemy !== this &&
                        newX < enemy.x + enemy.width &&
                        newX + this.width > enemy.x &&
                        newY < enemy.y + enemy.height &&
                        newY + this.height > enemy.y) {
                        return false;
                    }
                }

                if (this.isPlayer && player !== this) {
                    if (newX < player.x + player.width &&
                        newX + this.width > player.x &&
                        newY < player.y + player.height &&
                        newY + this.height > player.y) {
                        return false;
                    }
                }

                if (!this.isPlayer && player) {
                    if (newX < player.x + player.width &&
                        newX + this.width > player.x &&
                        newY < player.y + player.height &&
                        newY + this.height > player.y) {
                        return false;
                    }
                }

                return true;
            }

            fire() {
                const now = Date.now();
                if (now - this.lastFire < this.fireRate) return;
                this.lastFire = now;

                const bulletX = this.x + this.width / 2 - 4;
                const bulletY = this.y + this.height / 2 - 4;

                if (this.isPlayer) {
                    const centerX = this.x + this.width / 2;
                    const centerY = this.y + this.height / 2;
                    const dx = mouseX - centerX;
                    const dy = mouseY - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 1) {
                        const speed = 8;
                        const normalizedDx = (dx / distance) * speed;
                        const normalizedDy = (dy / distance) * speed;
                        
                        for (let i = 0; i < 100; i++) {
                            const angle = (Math.random() - 0.5) * 0.8;
                            const cos = Math.cos(angle);
                            const sin = Math.sin(angle);
                            const spreadDx = normalizedDx * cos - normalizedDy * sin;
                            const spreadDy = normalizedDx * sin + normalizedDy * cos;
                            bullets.push(new Bullet(bulletX, bulletY, spreadDx, spreadDy, this.isPlayer));
                        }
                    }
                } else {
                    let dx = 0;
                    let dy = 0;
                    const speed = 8;
                    
                    switch (this.direction) {
                        case 'up': dy = -speed; break;
                        case 'down': dy = speed; break;
                        case 'left': dx = -speed; break;
                        case 'right': dx = speed; break;
                    }
                    
                    bullets.push(new Bullet(bulletX, bulletY, dx, dy, this.isPlayer));
                }
            }

            takeDamage() {
                this.health--;
                createExplosion(this.x + this.width / 2, this.y + this.height / 2, this.isPlayer ? '#4ade80' : '#ef4444');
                return this.health <= 0;
            }
        }

        class Bullet {
            constructor(x, y, dx, dy, isPlayerBullet) {
                this.x = x;
                this.y = y;
                this.width = 8;
                this.height = 8;
                this.isPlayerBullet = isPlayerBullet;
                this.speed = 8;
                this.dx = dx;
                this.dy = dy;
            }

            draw() {
                ctx.fillStyle = this.isPlayerBullet ? '#ffd93d' : '#ff6b6b';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = this.isPlayerBullet ? '#fef08a' : '#fca5a5';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;
            }

            isOutOfBounds() {
                return this.x < -10 || this.x > canvas.width + 10 ||
                       this.y < -10 || this.y > canvas.height + 10;
            }
        }

        class Obstacle {
            constructor(x, y, width, height, type = 'brick') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.health = type === 'brick' ? 2 : type === 'concrete' ? 4 : 1;
            }

            draw() {
                if (this.type === 'brick') {
                    ctx.fillStyle = '#dc2626';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#991b1b';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < this.width; i += 10) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + i, this.y);
                        ctx.lineTo(this.x + i, this.y + this.height);
                        ctx.stroke();
                    }
                } else if (this.type === 'concrete') {
                    ctx.fillStyle = '#6b7280';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#4b5563';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);
                } else if (this.type === 'water') {
                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#60a5fa';
                    for (let i = 0; i < this.width; i += 8) {
                        ctx.beginPath();
                        ctx.arc(this.x + i + 4, this.y + this.height / 2 + Math.sin(Date.now() / 200 + i) * 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (this.type === 'tree') {
                    ctx.fillStyle = '#166534';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            takeDamage() {
                this.health--;
                return this.health <= 0;
            }
        }

        class Particle {
            constructor(x, y, color, type = 'normal', partType = null) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                this.partType = partType;
                
                if (type === 'fire') {
                    this.size = Math.random() * 8 + 4;
                    this.speedX = (Math.random() - 0.5) * 10;
                    this.speedY = (Math.random() - 0.5) * 6 - 2;
                    this.life = 1;
                    this.decay = 0.04 + Math.random() * 0.02;
                    this.gravity = 0.05;
                    this.alpha = 1;
                } else if (type === 'tankPart') {
                    const baseSize = 8;
                    this.size = Math.random() * 6 + baseSize;
                    this.speedX = (Math.random() - 0.5) * 15;
                    this.speedY = (Math.random() - 0.5) * 15 - 5;
                    this.life = 1;
                    this.decay = 0.01 + Math.random() * 0.01;
                    this.gravity = 0.2;
                    this.alpha = 1;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                } else {
                    this.size = Math.random() * 6 + 3;
                    this.speedX = (Math.random() - 0.5) * 12;
                    this.speedY = (Math.random() - 0.5) * 12;
                    this.life = 1;
                    this.decay = 0.015 + Math.random() * 0.025;
                    this.gravity = 0.1;
                    this.alpha = 1;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= this.decay;
                
                if (this.type === 'fire') {
                    this.size *= 0.88;
                    this.alpha = this.life * 0.9;
                } else if (this.type === 'tankPart') {
                    this.size *= 0.98;
                    this.alpha = this.life;
                    this.rotation += this.rotationSpeed;
                } else {
                    this.size *= 0.93;
                    this.alpha = this.life;
                }
            }

            draw() {
                if (this.type === 'fire') {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 15;
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = this.alpha * 0.6;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'tankPart') {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    
                    if (this.partType === 'turret') {
                        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                        ctx.fillStyle = '#1a1a2e';
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size/3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (this.partType === 'track') {
                        ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
                    } else if (this.partType === 'body') {
                        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    } else if (this.partType === 'wheel') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                } else {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y, color) {
            const baseColor = color;
            const secondaryColor = color === '#ef4444' ? '#fca5a5' : '#86efac';
            const tankColors = color === '#ef4444' ? ['#dc2626', '#991b1b', '#78350f'] : ['#22c55e', '#166534', '#059669'];
            
            const fireColors = [
                { color: '#ff4d4d', probability: 0.15 }, // 深红色
                { color: '#ff6b35', probability: 0.25 }, // 橙红色
                { color: '#f7931e', probability: 0.3 },  // 橙黄色
                { color: '#ffd23f', probability: 0.2 },  // 黄色
                { color: '#ff9a3c', probability: 0.1 }   // 橙色
            ];
            
            const tankParts = [
                { type: 'turret', count: 2 },
                { type: 'track', count: 4 },
                { type: 'body', count: 3 },
                { type: 'wheel', count: 6 }
            ];
            
            for (let i = 0; i < 50; i++) {
                if (i < 15) {
                    let random = Math.random();
                    let selectedColor = fireColors[0].color;
                    for (let j = 0; j < fireColors.length; j++) {
                        if (random <= fireColors[j].probability) {
                            selectedColor = fireColors[j].color;
                            break;
                        }
                        random -= fireColors[j].probability;
                    }
                    particles.push(new Particle(x, y, selectedColor, 'fire'));
                } else {
                    const particleColor = i % 2 === 0 ? baseColor : secondaryColor;
                    particles.push(new Particle(x, y, particleColor));
                }
            }
            
            for (let part of tankParts) {
                for (let i = 0; i < part.count; i++) {
                    const partColor = tankColors[Math.floor(Math.random() * tankColors.length)];
                    particles.push(new Particle(x, y, partColor, 'tankPart', part.type));
                }
            }
        }

        function createMap() {
            obstacles = [];

            for (let c = 0; c < COLS; c++) {
                obstacles.push(new Obstacle(c * GRID_SIZE, 0, GRID_SIZE, GRID_SIZE, 'brick'));
                obstacles.push(new Obstacle(c * GRID_SIZE, canvas.height - GRID_SIZE, GRID_SIZE, GRID_SIZE, 'brick'));
            }
            for (let r = 1; r < ROWS - 1; r++) {
                obstacles.push(new Obstacle(0, r * GRID_SIZE, GRID_SIZE, GRID_SIZE, 'brick'));
                obstacles.push(new Obstacle(canvas.width - GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE, 'brick'));
            }

            const patterns = [
                [[5, 5], [6, 5], [5, 6], [6, 6]],
                [[12, 5], [13, 5], [12, 6], [13, 6]],
                [[5, 10], [6, 10], [5, 11], [6, 11]],
                [[12, 10], [13, 10], [12, 11], [13, 11]],
                [[9, 7], [10, 7], [9, 8], [10, 8]],
                [[9, 3], [10, 3]],
                [[9, 12], [10, 12]],
                [[3, 7], [3, 8]],
                [[16, 7], [16, 8]],
            ];

            for (let pattern of patterns) {
                const type = Math.random() > 0.5 ? 'brick' : 'concrete';
                for (let [c, r] of pattern) {
                    obstacles.push(new Obstacle(c * GRID_SIZE + 2, r * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4, type));
                }
            }

            const waterPositions = [[2, 3], [3, 3], [2, 4], [15, 3], [16, 3], [15, 4]];
            for (let [c, r] of waterPositions) {
                obstacles.push(new Obstacle(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE, 'water'));
            }

            const treePositions = [[7, 2], [12, 2], [7, 13], [12, 13]];
            for (let [c, r] of treePositions) {
                obstacles.push(new Obstacle(c * GRID_SIZE + 5, r * GRID_SIZE + 5, GRID_SIZE - 10, GRID_SIZE - 10, 'tree'));
            }
        }

        function spawnEnemies(count) {
            const spawnPoints = [
                [canvas.width - GRID_SIZE * 2, GRID_SIZE],
                [canvas.width - GRID_SIZE * 2, canvas.height - GRID_SIZE * 2],
                [canvas.width - GRID_SIZE, canvas.height / 2 - GRID_SIZE / 2]
            ];

            for (let i = 0; i < count; i++) {
                const spawn = spawnPoints[i % spawnPoints.length];
                const offsetX = (i % 3) * GRID_SIZE;
                const offsetY = (Math.floor(i / 3)) * GRID_SIZE;
                const enemy = new Tank(
                    Math.min(spawn[0] + offsetX, canvas.width - GRID_SIZE * 2),
                    Math.min(spawn[1] + offsetY, canvas.height - GRID_SIZE * 2),
                    false,
                    wave
                );
                enemy.direction = 'left';
                enemies.push(enemy);
            }
        }

        function checkBulletCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                let hit = false;

                for (let j = obstacles.length - 1; j >= 0; j--) {
                    const obs = obstacles[j];
                    if (obs.type === 'water' || obs.type === 'tree') continue;

                    if (bullet.x < obs.x + obs.width &&
                        bullet.x + bullet.width > obs.x &&
                        bullet.y < obs.y + obs.height &&
                        bullet.y + bullet.height > obs.y) {
                        hit = true;
                        if (obs.type === 'brick' && obs.takeDamage()) {
                            createExplosion(obs.x + obs.width / 2, obs.y + obs.height / 2, '#9ca3af');
                            obstacles.splice(j, 1);
                        }
                        break;
                    }
                }

                if (hit) {
                    bullets.splice(i, 1);
                    continue;
                }

                if (bullet.isOutOfBounds()) {
                    bullets.splice(i, 1);
                    continue;
                }

                if (bullet.isPlayerBullet) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        if (bullet.x < enemy.x + enemy.width &&
                            bullet.x + bullet.width > enemy.x &&
                            bullet.y < enemy.y + enemy.height &&
                            bullet.y + bullet.height > enemy.y) {
                            hit = true;
                            if (enemy.takeDamage()) {
                                enemies.splice(j, 1);
                                score += 100;
                                totalKills++;
                                updateUI();
                            }
                            break;
                        }
                    }
                } else {
                    if (player && bullet.x < player.x + player.width &&
                        bullet.x + bullet.width > player.x &&
                        bullet.y < player.y + player.height &&
                        bullet.y + bullet.height > player.y) {
                        hit = true;
                        player.takeDamage();
                    }
                }

                if (hit) {
                    bullets.splice(i, 1);
                }
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
            document.getElementById('lives').textContent = player ? '∞' : 0;
        }

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            if (!player) {
                score = 0;
                wave = 1;
                bullets = [];
                particles = [];
                enemies = [];

                player = new Tank(GRID_SIZE * 2, canvas.height / 2 - GRID_SIZE / 2, true);
                createMap();
                spawnEnemies(3);
                updateUI();
            }

            gameState = 'playing';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function newGame() {
            score = 0;
            wave = 1;
            bullets = [];
            particles = [];
            enemies = [];
            player = new Tank(GRID_SIZE * 2, canvas.height / 2 - GRID_SIZE / 2, true);
            createMap();
            spawnEnemies(3);
            updateUI();
            startGame();
        }

        function gameOver() {
            gameState = 'gameover';
            
            if (score > bestScore) {
                bestScore = score;
            }
            if (wave > bestWave) {
                bestWave = wave;
            }
            saveProgress();
            updateMainMenuStats();
            
            document.getElementById('finalScore').textContent = `得分: ${score} | 波次: ${wave}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            gameState = 'menu';
            player = null;
        }

        function nextWave() {
            wave++;
            const enemyCount = 3 + Math.floor(wave * 1.5);
            spawnEnemies(enemyCount);
            updateUI();
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let x = 0; x < canvas.width; x += GRID_SIZE) {
                for (let y = 0; y < canvas.height; y += GRID_SIZE) {
                    ctx.fillStyle = '#3d3d54';
                    ctx.fillRect(x, y, GRID_SIZE, GRID_SIZE);
                }
            }

            for (let obs of obstacles) {
                obs.draw();
            }

            player.update(dt);
            player.draw();

            for (let enemy of enemies) {
                enemy.update(dt);
                enemy.draw();
            }

            for (let bullet of bullets) {
                bullet.update();
                bullet.draw();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            checkBulletCollisions();

            if (enemies.length === 0) {
                nextWave();
            }

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameState === 'playing' && player) {
                e.preventDefault();
                player.fire();
            }
            if (e.code === 'Escape' && gameState === 'playing') {
                restartGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0 && gameState === 'playing' && player) {
                e.preventDefault();
                player.fire();
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        loadProgress();
    </script>
</body>
</html>
